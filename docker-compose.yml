services:
  validator:
    # Use published image from GitHub Container Registry
    # image: ghcr.io/medizininformatik-initiative/mii-fhir-validator:0.0.1-alpha.3
    # Or build locally from source
    build:
      context: ./validator
      dockerfile: Dockerfile
    container_name: fhir-validator
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=${JAVA_OPTS}
      - FHIR_VERSION=${FHIR_VERSION}
      - TX_SERVER=${TX_SERVER}
      - IG_PARAMS=${IG_PARAMS}
    volumes:
      - ./igs:/igs:ro
      - fhir-package-cache:/root/.fhir/packages
    depends_on:
      blaze:
        condition: service_healthy
    networks:
      - fhir-network
    restart: unless-stopped
    profiles: ["blaze"]

  validator-ontoserver:
    # Use published image from GitHub Container Registry
    # image: ghcr.io/medizininformatik-initiative/mii-fhir-validator:0.0.1-alpha.1
    # Or build locally from source
    build:
      context: ./validator
      dockerfile: Dockerfile
    container_name: fhir-validator
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=${JAVA_OPTS}
      - FHIR_VERSION=${FHIR_VERSION}
      - TX_SERVER=${TX_SERVER}
      - IG_PARAMS=${IG_PARAMS}
    volumes:
      - ./igs:/igs:ro
      - fhir-package-cache:/root/.fhir/packages
      - ./nginx/certs:/certs:ro
    # depends_on nginx removed: validator connects directly to ontoserver via JVM proxy+mTLS
    networks:
      - fhir-network
    restart: unless-stopped
    profiles: ["ontoserver"]

  blaze:
    image: samply/blaze:latest
    container_name: blaze-terminology
    ports:
      - "8082:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx8g"
      DB_BLOCK_CACHE_SIZE: "1024"
      ENABLE_TERMINOLOGY_SERVICE: true
      ENABLE_TERMINOLOGY_LOINC: true
      ENABLE_TERMINOLOGY_SNOMED_CT: true
      SNOMED_CT_RELEASE_PATH: "/snomed-ct-release"
      TERMINOLOGY_SERVICE_GRAPH_CACHE_SIZE: 100000
    volumes:
      - blaze-data:/app/data
      - ./snomed-ct-release/SnomedCT_InternationalRF2_PRODUCTION_20250701T120000Z:/snomed-ct-release:ro
    networks:
      - fhir-network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles: ["blaze"]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fhir-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - fhir-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    profiles: ["ontoserver"]

networks:
  fhir-network:
    driver: bridge

volumes:
  fhir-package-cache:
  blaze-data:
