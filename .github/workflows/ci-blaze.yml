name: CI Blaze TermServer

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
    - main
    - develop

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Download MII terminology packages
      run: ./scripts/terminology/get-mii-terminology.sh install

    - name: Download SNOMED CT Release
      uses: ./.github/actions/speicherwolke-download
      with:
        token: ${{ secrets.SCT_DOWNLOAD_TOKEN }}
        filename: SnomedCT_InternationalRF2_PRODUCTION_20250701T120000Z.zip

    - name: Unzip SNOMED CT Release
      run: unzip SnomedCT_InternationalRF2_PRODUCTION_20250701T120000Z.zip -d snomed-ct-release
    
    - name: Prepare environment
      run: cp .env.default .env

    - name: Start services with Blaze profile (CI mode)
      run: docker compose --profile blaze -f docker-compose.yml -f .github/configs/docker-compose.ci.yml up --wait
    
    - name: Upload MII terminology to Blaze
      run: ./scripts/terminology/upload-terminology.sh
    
    - name: Wait for validator to be ready
      run: |
        echo "Waiting for validator to start..."
        for i in {1..60}; do
          # Check logs for the ready message
          if docker compose --profile blaze logs validator 2>&1 | grep -q "FHIR Validator HTTP Service started"; then
            echo "Validator is ready!"
            break
          fi
          echo "Attempt $i/60: Validator not ready yet..."
          sleep 3
        done
        
        # Verify it actually started
        if ! docker compose --profile blaze logs validator 2>&1 | grep -q "FHIR Validator HTTP Service started"; then
          echo "ERROR: Validator failed to start. Logs:"
          docker compose --profile blaze logs validator
          exit 1
        fi
    
    - name: Run validation test
      run: |
        FAILED=0
        PASSED=0
        mkdir -p validation-results

        for RESOURCE_FILE in .github/test-resources/*.json; do
          BASENAME=$(basename "$RESOURCE_FILE" .json)
          echo "Testing: $RESOURCE_FILE"

          # POST to validator and capture response
          RESPONSE=$(curl -s -X POST http://localhost:8080/validateResource \
            -H "Content-Type: application/fhir+json" \
            -H "Accept: application/fhir+json" \
            -d @"$RESOURCE_FILE")

          # Save OperationOutcome to file
          echo "$RESPONSE" | jq . > "validation-results/OperationOutcome-${BASENAME}.json"

          # Check that we got an OperationOutcome
          RESOURCE_TYPE=$(echo "$RESPONSE" | jq -r '.resourceType')
          if [ "$RESOURCE_TYPE" != "OperationOutcome" ]; then
            echo "ERROR: Expected OperationOutcome, got $RESOURCE_TYPE"
            echo "Check validation-results/OperationOutcome-${BASENAME}.json artifact for details."
            FAILED=$((FAILED + 1))
            continue
          fi

          # Check for fatal/error severity
          FATAL_ERRORS=$(echo "$RESPONSE" | jq '[.issue[] | select(.severity == "fatal" or .severity == "error")] | length')

          if [ "$FATAL_ERRORS" -gt 0 ]; then
            echo "✗ $RESOURCE_FILE failed with $FATAL_ERRORS fatal/error issue(s)."
            echo "Check validation-results/OperationOutcome-${BASENAME}.json artifact for details."
            FAILED=$((FAILED + 1))
          else
            echo "✓ $RESOURCE_FILE passed (no fatal/error issues)"
            PASSED=$((PASSED + 1))
          fi
        done

        echo ""
        echo "Results: $PASSED passed, $FAILED failed"
        if [ "$FAILED" -gt 0 ]; then
          echo "Validation failed. Download the 'validation-results' artifact to inspect full OperationOutcome files."
          exit 1
        fi

    - name: Upload OperationOutcome artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: validation-results
        path: validation-results/
        retention-days: 7
    
    - name: Show logs on failure
      if: failure()
      run: |
        echo "=== Docker Compose Logs ==="
        docker compose --profile blaze logs
        echo "=== Container Status ==="
        docker compose --profile blaze ps
    
    - name: Cleanup
      if: always()
      run: docker compose --profile blaze -f docker-compose.yml -f .github/configs/docker-compose.ci.yml down -v
