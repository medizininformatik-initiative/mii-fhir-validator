services:
  validator:
    # Check https://github.com/medizininformatik-initiative/mii-fhir-validator/releases for available versions
    image: ghcr.io/medizininformatik-initiative/mii-fhir-validator:0.0.1-alpha.6
    # To build locally from source instead:
    # build:
    #   context: .
    #   dockerfile: validator/Dockerfile
    container_name: fhir-validator
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=${JAVA_OPTS}
      - FHIR_VERSION=${FHIR_VERSION:-4.0}
      - TX_SERVER=${TX_SERVER:-http://blaze-terminology:8080/fhir}
      - TX_CACHE_DIR=${TX_CACHE_DIR:-/tmp/tx-cache}
      - TX_LOG=${TX_LOG:-/tmp/tx-cache/tx.log}
      - IG_PARAMS=${IG_PARAMS}
    volumes:
      - ./igs:/igs:ro
      - fhir-package-cache:/root/.fhir/packages
      - tx-cache:${TX_CACHE_DIR:-/tmp/tx-cache}
      # Optional: override the built-in advisor configuration
      # - ./validator/advisor.json:/app/validator/advisor.json:ro
    depends_on:
      blaze:
        condition: service_healthy
    networks:
      - fhir-network
    restart: unless-stopped
    profiles: ["blaze"]

  validator-ontoserver:
    # Check https://github.com/medizininformatik-initiative/mii-fhir-validator/releases for available versions
    image: ghcr.io/medizininformatik-initiative/mii-fhir-validator:0.0.1-alpha.6
    # To build locally from source instead:
    # build:
    #   context: .
    #   dockerfile: validator/Dockerfile
    container_name: fhir-validator
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=${JAVA_OPTS}
      - FHIR_VERSION=${FHIR_VERSION:-4.0}
      - TX_SERVER=${TX_SERVER:-http://nginx/fhir}
      - TX_CACHE_DIR=${TX_CACHE_DIR:-/tmp/tx-cache}
      - TX_LOG=${TX_LOG:-/tmp/tx-cache/tx.log}
      - IG_PARAMS=${IG_PARAMS}
    volumes:
      - ./igs:/igs:ro
      - fhir-package-cache:/root/.fhir/packages
      - tx-cache:${TX_CACHE_DIR:-/tmp/tx-cache}
      - ./nginx/certs:/certs:ro
      # Optional: override the built-in advisor configuration
      # - ./validator/advisor.json:/app/validator/advisor.json:ro
    # depends_on nginx removed: validator connects directly to ontoserver via JVM proxy+mTLS
    networks:
      - fhir-network
    restart: unless-stopped
    profiles: ["ontoserver"]

  blaze:
    image: samply/blaze:1.6.2@sha256:4148d6cc9daf1f7237270878535d176b1e24b8d4092dcf636d42778c3a49dbc8
    container_name: blaze-terminology
    ports:
      - "8082:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx8g"
      DB_BLOCK_CACHE_SIZE: "1024"
      ENABLE_TERMINOLOGY_SERVICE: true
      ENABLE_TERMINOLOGY_LOINC: true
      ENABLE_TERMINOLOGY_SNOMED_CT: true
      SNOMED_CT_RELEASE_PATH: "/snomed-ct-release"
      TERMINOLOGY_SERVICE_GRAPH_CACHE_SIZE: 100000
    volumes:
      - blaze-data:/app/data
      - ./snomed-ct-release/SnomedCT_InternationalRF2_PRODUCTION_20250701T120000Z:/snomed-ct-release:ro
    networks:
      - fhir-network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles: ["blaze"]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fhir-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - fhir-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    profiles: ["ontoserver"]

networks:
  fhir-network:
    driver: bridge

volumes:
  fhir-package-cache:
  blaze-data:
  tx-cache:
